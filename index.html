<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moodboard</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root {
    --bg: #FAFAFA;
    --canvas-grid: rgba(0,0,0,0.06);
    --canvas-grid-bg: #FAFAFA;
    --text: #1a1a1c;
    --text-muted: rgba(60,60,67,0.6);
    --text-soft: rgba(0,0,0,0.55);
    --glass-bg: rgba(255,255,255,0.62);
    --glass-bg-strong: rgba(255,255,255,0.72);
    --glass-stroke: rgba(255,255,255,0.55);
    --hairline: rgba(0,0,0,0.08);
    --hairline-soft: rgba(0,0,0,0.06);
    --field-bg: rgba(118,118,128,0.08);
    --accent: #2F6FED;
    --accent-glow: rgba(47,111,237,0.18);
    --danger: #E5484D;
    --success: #34A853;
    --card-bg: #FFFFFF;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 28px rgba(0,0,0,0.12);
    --shadow-xl: 0 20px 60px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.04);
    --spring: cubic-bezier(0.32, 0.72, 0, 1);
    --easing: cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font-family: inherit; border: none; outline: none; background: none; color: inherit; }

  /* ======================== ЭКРАН ВХОДА ======================== */
  .auth-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    z-index: 100;
    transition: opacity 500ms var(--spring), transform 500ms var(--spring);
  }
  .auth-screen.leaving {
    opacity: 0; transform: scale(1.06);
    pointer-events: none;
  }

  /* Анимированный mesh-фон */
  .mesh-bg {
    position: absolute; inset: -10%;
    z-index: 0;
    filter: blur(80px) saturate(140%);
  }
  .mesh-bg .blob {
    position: absolute; border-radius: 50%;
    mix-blend-mode: normal;
    opacity: 0.85;
    animation: drift 24s ease-in-out infinite;
  }
  .mesh-bg .b1 { background: #FFD2B8; width: 55%; height: 55%; top: -10%; left: -8%; animation-delay: 0s; }
  .mesh-bg .b2 { background: #D8C4F4; width: 50%; height: 50%; top: 10%; right: -10%; animation-delay: -6s; animation-duration: 28s; }
  .mesh-bg .b3 { background: #B6E8D2; width: 60%; height: 60%; bottom: -15%; left: 10%; animation-delay: -12s; animation-duration: 32s; }
  .mesh-bg .b4 { background: #FFE0A6; width: 40%; height: 40%; bottom: 5%; right: 15%; animation-delay: -18s; animation-duration: 26s; }
  .mesh-bg .b5 { background: #F4C8D6; width: 35%; height: 35%; top: 35%; left: 35%; animation-delay: -3s; animation-duration: 30s; }
  @keyframes drift {
    0%, 100% { transform: translate(0,0) scale(1); }
    25% { transform: translate(8%, -6%) scale(1.08); }
    50% { transform: translate(-5%, 8%) scale(0.95); }
    75% { transform: translate(-8%, -4%) scale(1.05); }
  }

  .auth-card {
    position: relative; z-index: 1;
    width: 380px; max-width: calc(100vw - 40px);
    padding: 28px;
    border-radius: 28px;
    background: var(--glass-bg);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    box-shadow:
      inset 0 0 0 0.5px var(--glass-stroke),
      0 20px 60px rgba(0,0,0,0.12),
      0 1px 2px rgba(0,0,0,0.04);
    display: flex; flex-direction: column; gap: 20px;
    animation: cardEnter 600ms var(--spring) both;
  }
  @keyframes cardEnter {
    0% { opacity: 0; transform: translateY(16px) scale(0.96); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .auth-card.shake { animation: shake 320ms var(--easing); }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    12.5%, 37.5%, 62.5%, 87.5% { transform: translateX(-6px); }
    25%, 50%, 75% { transform: translateX(6px); }
  }

  .app-icon {
    width: 56px; height: 56px;
    border-radius: 13px;
    background: linear-gradient(135deg, #FF9A8B 0%, #FF6A88 100%);
    display: flex; align-items: center; justify-content: center;
    color: white;
    align-self: flex-start;
    position: relative;
    box-shadow:
      inset 0 0.5px 0 rgba(255,255,255,0.5),
      inset 0 -0.5px 0 rgba(0,0,0,0.1),
      0 2px 6px rgba(255,106,136,0.35);
  }
  .app-icon::after {
    content: ''; position: absolute; inset: 1px;
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0) 50%);
    pointer-events: none;
  }
  .app-icon svg { width: 28px; height: 28px; position: relative; z-index: 1; }

  .auth-card h1 {
    font-size: 28px; font-weight: 700; letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .auth-card .subtitle {
    font-size: 15px; color: var(--text-soft); line-height: 1.35;
  }

  .field {
    position: relative;
    height: 50px;
    border-radius: 14px;
    background: var(--field-bg);
    display: flex; align-items: center;
    transition: box-shadow 180ms var(--easing), background 180ms var(--easing);
  }
  .field:focus-within {
    background: var(--field-bg);
    box-shadow:
      inset 0 0 0 2px var(--accent),
      0 0 0 4px var(--accent-glow);
  }
  .field .icon {
    width: 44px; display: flex; justify-content: center; align-items: center;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .field input {
    flex: 1;
    height: 100%;
    font-size: 17px;
    color: var(--text);
    padding-right: 14px;
  }
  .field input::placeholder { color: var(--text-muted); }
  .field .eye-btn {
    width: 44px; height: 100%; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    flex-shrink: 0;
    border-radius: 0 14px 14px 0;
    transition: color 150ms;
  }
  .field .eye-btn:hover { color: var(--text); }

  .btn-primary {
    height: 50px;
    border-radius: 14px;
    background: var(--accent);
    color: white;
    font-size: 17px; font-weight: 600;
    transition: transform 150ms var(--spring), opacity 150ms var(--easing), background 150ms;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary:not(:disabled):hover { background: #2862D9; }

  .err {
    font-size: 14px;
    color: var(--danger);
    text-align: center;
    height: 0; opacity: 0;
    overflow: hidden;
    transition: height 200ms var(--easing), opacity 200ms;
  }
  .err.show { height: 18px; opacity: 1; }

  /* ======================== МУДБОРД ======================== */
  .board-screen {
    position: fixed; inset: 0;
    background-color: var(--canvas-grid-bg);
    background-image:
      radial-gradient(circle, var(--canvas-grid) 1px, transparent 1.2px);
    background-size: 24px 24px;
    background-position: 0 0;
    overflow: hidden;
    opacity: 0;
    transition: opacity 500ms var(--spring) 100ms;
  }
  .board-screen.drawing-mode { cursor: crosshair !important; }
  .board-screen.drawing-mode .card { pointer-events: none; }
  .board-screen.visible { opacity: 1; }

  .canvas {
    position: absolute; inset: 0;
    transform-origin: 0 0;
    will-change: transform;
  }
  .draw-layer {
    position: absolute;
    left: -10000px; top: -10000px;
    width: 20000px; height: 20000px;
    pointer-events: none;
    overflow: visible;
  }
  .draw-layer path {
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    animation: strokeIn 400ms var(--easing) both;
  }
  @keyframes strokeIn {
    0% { stroke-dasharray: 1; stroke-dashoffset: 1; opacity: 0; }
    40% { opacity: 1; }
    100% { stroke-dasharray: none; stroke-dashoffset: 0; opacity: 1; }
  }
  .canvas.panning { cursor: grabbing !important; }
  .board-screen.space-down { cursor: grab; }

  /* Тулбар */
  .toolbar {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 50;
    display: flex; align-items: center; gap: 4px;
    padding: 8px 12px;
    background: var(--glass-bg-strong);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border-radius: 22px;
    box-shadow:
      inset 0 0 0 0.5px var(--glass-stroke),
      0 8px 24px rgba(0,0,0,0.08);
  }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 14px; font-weight: 600;
    flex-shrink: 0;
    box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.4);
  }
  .divider-v {
    width: 0.5px; height: 22px; background: var(--hairline); margin: 0 6px;
  }
  .tool-btn {
    width: 40px; height: 40px;
    padding: 0;
    border-radius: 12px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text);
    position: relative;
    transition: background 150ms, transform 120ms var(--spring);
  }
  .tool-btn .label-text { display: none; }
  .tool-btn[data-tip]::before,
  .tool-btn[data-tip]::after {
    position: absolute;
    left: 50%; top: calc(100% + 10px);
    transform: translateX(-50%) translateY(-4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 180ms var(--easing), transform 220ms var(--spring);
    z-index: 80;
  }
  .tool-btn[data-tip]::before {
    content: attr(data-tip);
    background: rgba(20,20,22,0.92);
    color: white;
    font-size: 12px; font-weight: 500;
    padding: 6px 10px;
    border-radius: 8px;
    white-space: nowrap;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    backdrop-filter: blur(20px);
  }
  .tool-btn[data-tip]::after {
    content: '';
    width: 8px; height: 8px;
    background: rgba(20,20,22,0.92);
    top: calc(100% + 6px);
    transform: translateX(-50%) rotate(45deg) translateY(-2px);
    border-radius: 1px;
  }
  .tool-btn[data-tip]:hover::before,
  .tool-btn[data-tip]:hover::after {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .tool-btn[data-tip]:hover::after {
    transform: translateX(-50%) rotate(45deg) translateY(0);
  }
  .tool-btn:hover { background: rgba(120,120,128,0.12); }
  .tool-btn:active { transform: scale(0.92); }
  .tool-btn svg { width: 20px; height: 20px; transition: transform 220ms var(--spring); }
  .tool-btn:hover svg { transform: scale(1.12) rotate(-4deg); }
  .tool-btn.icon-only { width: 40px; padding: 0; justify-content: center; }
  .tool-btn.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 12px rgba(47,111,237,0.35);
  }
  .tool-btn.active:hover { background: #2862D9; }
  .tool-btn.active svg { transform: none; }

  /* Drawing controls popover */
  .draw-popover {
    position: fixed;
    top: 68px; left: 50%;
    transform: translateX(-50%) translateY(-8px) scale(0.92);
    z-index: 60;
    background: var(--glass-bg-strong);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border-radius: 18px;
    padding: 10px 12px;
    box-shadow:
      inset 0 0 0 0.5px var(--glass-stroke),
      0 12px 32px rgba(0,0,0,0.12);
    display: flex; align-items: center; gap: 14px;
    opacity: 0; pointer-events: none;
    transition: opacity 220ms var(--easing), transform 280ms var(--spring);
  }
  .draw-popover.show {
    opacity: 1; pointer-events: auto;
    transform: translateX(-50%) translateY(0) scale(1);
  }
  .draw-popover .group { display: flex; align-items: center; gap: 6px; }
  .draw-popover .group-label {
    font-size: 11px; font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-right: 2px;
  }
  .swatch {
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.15);
    transition: transform 200ms var(--spring), box-shadow 200ms;
  }
  .swatch:hover { transform: scale(1.18); }
  .swatch.active {
    transform: scale(1.18);
    box-shadow:
      inset 0 0 0 0.5px rgba(0,0,0,0.15),
      0 0 0 2px var(--bg),
      0 0 0 4px var(--accent);
  }
  .size-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: background 150ms, transform 200ms var(--spring);
  }
  .size-btn:hover { background: rgba(120,120,128,0.12); transform: scale(1.1); }
  .size-btn .dot {
    background: var(--text);
    border-radius: 50%;
    transition: transform 200ms var(--spring);
  }
  .size-btn.active { background: rgba(47,111,237,0.12); }
  .size-btn.active .dot { background: var(--accent); }

  .conn-status {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 0 10px;
    height: 36px;
    font-size: 13px;
    color: var(--text-soft);
    max-width: 180px;
  }
  .conn-status .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(120,120,128,0.4);
    flex-shrink: 0;
  }
  .conn-status.online .dot {
    background: var(--success);
    animation: pulse 2s ease-in-out infinite;
  }
  .toolbar { animation: toolbarSlide 600ms var(--spring) both; }
  @keyframes toolbarSlide {
    0% { opacity: 0; transform: translateX(-50%) translateY(-12px) scale(0.96); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  }
  .conn-status .label {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(52,168,83,0.5); }
    50% { box-shadow: 0 0 0 6px rgba(52,168,83,0); }
  }

  /* Карточки на холсте */
  .card {
    position: absolute;
    border-radius: 16px;
    background: var(--card-bg);
    box-shadow:
      inset 0 0 0 0.5px var(--hairline-soft),
      0 4px 12px rgba(0,0,0,0.08);
    transition: transform 240ms var(--spring), box-shadow 600ms var(--easing);
    user-select: none;
    overflow: visible;
    animation: cardPop 380ms var(--spring) both;
  }
  /* Inner content clip so images stay inside the rounded corners while the
     card itself can cast an outer glow */
  .card > .card-inner {
    position: absolute; inset: 0;
    border-radius: inherit;
    overflow: hidden;
    z-index: 1;
  }
  /* Soft animated chromatic halo behind every card */
  .card::before {
    content: '';
    position: absolute;
    inset: -14px;
    border-radius: 22px;
    background: conic-gradient(
      from var(--glow-angle, 0deg),
      oklch(0.78 0.15 20 / 0.55),
      oklch(0.80 0.14 70 / 0.5),
      oklch(0.82 0.14 150 / 0.5),
      oklch(0.78 0.15 220 / 0.55),
      oklch(0.78 0.16 300 / 0.55),
      oklch(0.78 0.15 20 / 0.55)
    );
    filter: blur(22px);
    opacity: 0;
    z-index: 0;
    pointer-events: none;
    transition: opacity 700ms var(--easing);
    animation: glowSpin 14s linear infinite;
  }
  .card:hover::before { opacity: 0.55; }
  .card.dragging::before { opacity: 0.85; }
  @property --glow-angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }
  @keyframes glowSpin {
    0% { --glow-angle: 0deg; }
    100% { --glow-angle: 360deg; }
  }
  /* Periodic ambient breathing glow — subtle on idle cards */
  .card::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: inherit;
    box-shadow: 0 0 0 0 transparent;
    pointer-events: none;
    z-index: 0;
    animation: cardBreathe 6s ease-in-out infinite;
    animation-delay: var(--breathe-delay, 0s);
  }
  @keyframes cardBreathe {
    0%, 100% { box-shadow: 0 0 0 0 rgba(120,140,255,0); }
    50% { box-shadow: 0 0 28px 2px var(--breathe-color, rgba(120,140,255,0.18)); }
  }
  @keyframes cardPop {
    0% { opacity: 0; transform: scale(0.78) rotate(-2deg); }
    60% { opacity: 1; transform: scale(1.04) rotate(0.5deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow:
      inset 0 0 0 0.5px var(--hairline-soft),
      0 18px 40px rgba(0,0,0,0.14),
      0 0 0 1px var(--card-accent, rgba(0,122,255,0.18));
  }
  .card.dragging {
    transition: none;
    box-shadow:
      inset 0 0 0 0.5px var(--hairline-soft),
      0 24px 50px rgba(0,0,0,0.22),
      0 0 60px 4px var(--card-accent, rgba(0,122,255,0.45));
    cursor: grabbing;
    z-index: 10;
  }
  /* Brief flash when a card lands or remote partner edits it */
  .card.flash::after {
    animation: cardFlash 1100ms var(--easing);
  }
  @keyframes cardFlash {
    0% { box-shadow: 0 0 0 0 var(--card-accent, rgba(0,122,255,0.6)); }
    40% { box-shadow: 0 0 36px 8px var(--card-accent, rgba(0,122,255,0.55)); }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .card .delete-btn {
    position: absolute; top: 8px; right: 8px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    color: white;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 150ms, transform 150ms var(--spring), background 200ms;
    backdrop-filter: blur(8px);
    z-index: 3;
  }
  .card:hover .delete-btn { opacity: 1; }
  .card .delete-btn:hover {
    transform: scale(1.12);
    background: rgba(255,59,48,0.92);
  }
  .card .delete-btn svg { width: 12px; height: 12px; }

  .card-image .card-inner img {
    display: block; width: 100%; height: 100%;
    object-fit: cover;
    pointer-events: none;
    transition: transform 600ms var(--easing);
  }
  .card-image:hover .card-inner img { transform: scale(1.025); }
  .card-note .card-inner {
    padding: 16px;
    font-size: 15px;
    line-height: 1.4;
    background: #FFF8DC;
    color: #2a2a2a;
  }
  .card-note .text-area {
    width: 100%; height: 100%;
    background: transparent; border: none; outline: none;
    resize: none;
    font-family: inherit; font-size: inherit; color: inherit; line-height: inherit;
  }
  .card-color .card-inner {
    width: 100%; height: 100%;
  }
  .card-color .swatch-label {
    position: absolute; bottom: 10px; left: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    padding: 3px 7px;
    border-radius: 6px;
    background: rgba(255,255,255,0.85);
    color: #1a1a1c;
    backdrop-filter: blur(6px);
    z-index: 2;
  }
  /* Animated diagonal sheen across color swatches */
  .card-color .card-inner::after {
    content: '';
    position: absolute; inset: -50%;
    background: linear-gradient(115deg,
      transparent 30%,
      rgba(255,255,255,0.32) 47%,
      rgba(255,255,255,0.55) 50%,
      rgba(255,255,255,0.32) 53%,
      transparent 70%);
    transform: translateX(-60%);
    pointer-events: none;
    transition: transform 1100ms var(--easing);
  }
  .card-color:hover .card-inner::after { transform: translateX(60%); }

  /* Drop overlay */
  .drop-overlay {
    position: fixed; inset: 0;
    z-index: 40;
    pointer-events: none;
    background: rgba(47,111,237,0.04);
    border: 2px dashed transparent;
    border-radius: 0;
    opacity: 0;
    transition: opacity 200ms;
  }
  .drop-overlay.show {
    opacity: 1;
    border-color: var(--accent);
    background: rgba(47,111,237,0.08);
  }

  /* ========== PARTNER CURSOR ========== */
  .partner-cursor {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 500;
    transition: transform 80ms linear, opacity 240ms var(--easing);
    will-change: transform;
  }
  .partner-cursor.fade-out { opacity: 0; }
  .partner-cursor svg {
    display: block;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
  }
  .partner-cursor .name-tag {
    position: absolute;
    top: 22px; left: 16px;
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 12px; font-weight: 600;
    color: white;
    white-space: nowrap;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    line-height: 1.2;
  }

  /* ========== REACTIONS ========== */
  .reaction-fly {
    position: fixed;
    pointer-events: none;
    font-size: 48px;
    line-height: 1;
    z-index: 600;
    animation: reactionRise 1200ms cubic-bezier(0.32, 0.72, 0, 1) forwards;
    transform-origin: center;
  }
  @keyframes reactionRise {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    20%  { opacity: 1; transform: translate(-50%, -60%) scale(1.2); }
    40%  { opacity: 1; transform: translate(-50%, -70%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -180%) scale(1); }
  }

  /* ========== POINT MARKER ========== */
  .point-marker {
    position: fixed;
    pointer-events: none;
    z-index: 550;
    transform: translate(-50%, -50%);
    transition: opacity 300ms var(--easing);
  }
  .point-marker .ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 60px; height: 60px;
    border-radius: 50%;
    background: var(--pmcolor, #2F6FED);
    opacity: 0.45;
    animation: pointPulse 800ms var(--spring) infinite;
  }
  .point-marker .ring.r2 { animation-delay: 400ms; }
  @keyframes pointPulse {
    0% { width: 60px; height: 60px; opacity: 0.6; }
    100% { width: 100px; height: 100px; opacity: 0; }
  }
  .point-marker .core {
    position: relative;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--pmcolor, #2F6FED);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25), inset 0 0.5px 0 rgba(255,255,255,0.4);
  }
  .point-marker.fade { opacity: 0; }

  /* Модалка */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 250ms var(--easing);
  }
  .modal-backdrop.show {
    opacity: 1; pointer-events: auto;
  }
  .modal {
    width: 360px; max-width: calc(100vw - 32px);
    background: var(--glass-bg-strong);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-radius: 24px;
    padding: 28px 24px 24px;
    box-shadow:
      inset 0 0 0 0.5px var(--glass-stroke),
      0 30px 80px rgba(0,0,0,0.25);
    transform: scale(0.9); opacity: 0;
    transition: transform 300ms var(--spring), opacity 250ms var(--easing);
    position: relative;
    display: flex; flex-direction: column; gap: 16px;
  }
  .modal-backdrop.show .modal {
    transform: scale(1); opacity: 1;
  }
  .modal h2 {
    font-size: 20px; font-weight: 700; letter-spacing: -0.01em;
    text-align: center;
  }
  .modal .close-btn {
    position: absolute; top: 14px; right: 14px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(120,120,128,0.18);
    color: var(--text-soft);
    display: flex; align-items: center; justify-content: center;
    transition: background 150ms;
  }
  .modal .close-btn:hover { background: rgba(120,120,128,0.28); }
  .modal .close-btn svg { width: 12px; height: 12px; }

  .invite-code {
    text-align: center;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 36px; font-weight: 600;
    letter-spacing: 0.1em;
    padding: 18px 0;
    color: var(--text);
    background: var(--field-bg);
    border-radius: 14px;
  }
  .btn-secondary {
    height: 44px;
    border-radius: 12px;
    background: rgba(120,120,128,0.12);
    color: var(--accent);
    font-size: 15px; font-weight: 600;
    transition: background 150ms, transform 120ms var(--spring);
  }
  .btn-secondary:hover { background: rgba(120,120,128,0.18); }
  .btn-secondary:active { transform: scale(0.98); }

  .or-sep {
    display: flex; align-items: center; gap: 12px;
    color: var(--text-muted);
    font-size: 13px;
    margin: 4px 0;
  }
  .or-sep::before, .or-sep::after {
    content: ''; flex: 1; height: 0.5px; background: var(--hairline);
  }
  .modal .field { height: 44px; }
  .modal .field input { font-size: 15px; padding-left: 14px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(20,20,22,0.92);
    color: white;
    padding: 12px 20px;
    border-radius: 100px;
    font-size: 14px; font-weight: 500;
    backdrop-filter: blur(20px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    opacity: 0; pointer-events: none;
    transition: opacity 250ms var(--easing), transform 250ms var(--spring);
    z-index: 300;
  }
  .toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }

  /* Mobile */
  @media (max-width: 640px) {
    .toolbar {
      top: auto; bottom: 16px;
      left: 12px; right: 12px;
      transform: none;
      justify-content: space-between;
      padding: 8px;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .toolbar::-webkit-scrollbar { display: none; }
    .tool-btn { width: 44px; height: 44px; }
    .tool-btn.icon-only { width: 44px; }
    .tool-btn[data-tip]::before, .tool-btn[data-tip]::after { display: none; }
    .conn-status { max-width: 120px; height: 44px; }
    .auth-card { padding: 24px; }
  }

  /* Hide caret in input fields except focused */
  .card-note .text-area:not(:focus) { caret-color: transparent; }
</style>
</head>
<body>

<!-- ================== АНИМИРОВАННЫЙ MESH-ФОН + ВХОД ================== -->
<div class="auth-screen" id="authScreen">

    </button>
    <button class="tool-btn" id="markerBtn" data-tip="Маркер" data-tool="marker">

    </button>
    <button class="tool-btn" id="eraserBtn" data-tip="Ластик" data-tool="eraser">

<div class="modal-backdrop" id="shareModal">

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"/></svg>

      Поделись кодом, чтобы создать пару
    </p>
    <div class="invite-code" id="inviteCode">······</div>

      <input type="text" id="connectInput" placeholder="Ввести код партнёра" maxlength="6" style="text-align:center; letter-spacing:0.05em; font-family:ui-monospace, 'SF Mono', monospace;">

<div class="toast" id="toast">Скопировано</div>

<script>
/* ============================================================
   STATE
============================================================ */
const SECRET = 'ninaluv67';
let nickname = '';
let myPeerId = null;
let peer = null;
let conn = null;
let partnerName = null;

const cards = new Map();
const strokes = new Map();
let nextZ = 1;
let partnerColor = null;
let viewport = { x: 0, y: 0, scale: 1 };

const canvasEl = document.getElementById('canvas');
const boardScreen = document.getElementById('boardScreen');

/* ============================================================
   AUTH
============================================================ */
const authScreen = document.getElementById('authScreen');
const authCard = document.getElementById('authCard');
const codeInput = document.getElementById('codeInput');
const nameInput = document.getElementById('nameInput');
const enterBtn = document.getElementById('enterBtn');
const errMsg = document.getElementById('errMsg');
const eyeBtn = document.getElementById('eyeBtn');

function updateEnterBtn() {
  enterBtn.disabled = !(codeInput.value.length && nameInput.value.trim().length);
}
codeInput.addEventListener('input', () => { errMsg.classList.remove('show'); updateEnterBtn(); });
nameInput.addEventListener('input', updateEnterBtn);

eyeBtn.addEventListener('click', () => {
  const showing = codeInput.type === 'text';
  codeInput.type = showing ? 'password' : 'text';
  eyeBtn.innerHTML = showing
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7c2.4 0 4.4.5 6.1 1.4M22 12s-3.5 7-10 7c-2.4 0-4.4-.5-6-1.4"/><path d="M9.5 9.5a3 3 0 0 0 4.2 4.2"/><path d="M3 3l18 18"/></svg>';
});

authCard.addEventListener('submit', (e) => {
  e.preventDefault();
  const code = codeInput.value;
  const name = nameInput.value.trim();
  if (!code || !name) return;
  if (code !== SECRET) {
    errMsg.classList.add('show');
    authCard.classList.remove('shake');
    void authCard.offsetWidth;
    authCard.classList.add('shake');
    return;
  }
  nickname = name;
  localStorage.setItem('moodboard_nickname', name);
  enterBoard();
});

function enterBoard() {
  authScreen.classList.add('leaving');
  setTimeout(() => {
    authScreen.style.display = 'none';
    document.getElementById('toolbar').style.display = 'flex';
    boardScreen.classList.add('visible');
    setupBoard();
  }, 480);
}

// Авто-вход если есть сохранённый ник + сессия
const savedName = localStorage.getItem('moodboard_nickname');
const sessionActive = sessionStorage.getItem('moodboard_session') === '1';
if (savedName && sessionActive) {
  nickname = savedName;
  authScreen.style.display = 'none';
  document.getElementById('toolbar').style.display = 'flex';
  boardScreen.classList.add('visible');
  setTimeout(setupBoard, 50);
} else if (savedName) {
  nameInput.value = savedName;
  updateEnterBtn();
  codeInput.focus();
} else {
  setTimeout(() => codeInput.focus(), 700);
}

/* ============================================================
   BOARD SETUP
============================================================ */
function setupBoard() {
  sessionStorage.setItem('moodboard_session', '1');
  // Установить аватар
  const av = document.getElementById('avatar');
  av.textContent = (nickname[0] || 'A').toUpperCase();
  av.style.background = avatarGradient(nickname);
  av.title = nickname;

  // Создать SVG-слой для рисования
  const svgNS = 'http://www.w3.org/2000/svg';
  const drawSvg = document.createElementNS(svgNS, 'svg');
  drawSvg.setAttribute('class', 'draw-layer');
  drawSvg.id = 'drawLayer';
  drawSvg.setAttribute('viewBox', '-10000 -10000 20000 20000');
  canvasEl.appendChild(drawSvg);

  initPeer();
  setupToolbarActions();
  setupCanvasInteractions();
  setupShareModal();
  setupDragDrop();
  setupDrawingTools();
  setupCursorReactionsPoint();
  // Центрируем viewport
  viewport.x = window.innerWidth / 2;
  viewport.y = window.innerHeight / 2;
  applyViewport();
}

function avatarGradient(name) {
  // Стабильная палитра по нику
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  const hue = h % 360;
  return `linear-gradient(135deg, oklch(0.72 0.14 ${hue}) 0%, oklch(0.62 0.16 ${(hue + 40) % 360}) 100%)`;
}

function applyViewport() {
  canvasEl.style.transform = `translate(${viewport.x}px, ${viewport.y}px) scale(${viewport.scale})`;
}

/* ============================================================
   PEER
============================================================ */
function genCode() {
  return Math.floor(100000 + Math.random() * 900000).toString();
}

function initPeer() {
  myPeerId = 'mb-' + genCode();
  document.getElementById('inviteCode').textContent = myPeerId.replace('mb-', '');
  try {
    peer = new Peer(myPeerId);
    peer.on('open', (id) => {
      console.log('Peer ready:', id);
    });
    peer.on('connection', (c) => {
      attachConn(c);
    });
    peer.on('error', (err) => {
      console.warn('Peer error:', err.type, err);
    });
  } catch (e) {
    console.warn('PeerJS init failed', e);
  }
}

function attachConn(c) {
  conn = c;
  c.on('open', () => {
    setConnStatus(true, partnerName || 'Партнёр');
    // обмен ником и снапшотом
    c.send({ type: 'hello', name: nickname, color: hashColor(nickname) });
    c.send({ type: 'snapshot', cards: Array.from(cards.values()), strokes: Array.from(strokes.values()) });
  });
  c.on('data', handleRemote);
  c.on('close', () => setConnStatus(false));
  c.on('error', () => setConnStatus(false));
}

function setConnStatus(online, name) {
  const el = document.getElementById('connStatus');
  const lab = el.querySelector('.label');
  if (online) {
    el.classList.add('online');
    lab.textContent = name || 'Подключено';
  } else {
    el.classList.remove('online');
    lab.textContent = 'Ожидание...';
  }
}

function handleRemote(msg) {
  if (!msg || !msg.type) return;
  if (msg.type === 'hello') {
    partnerName = msg.name;
    partnerColor = msg.color || hashColor(msg.name || 'partner');
    setConnStatus(true, partnerName);
  } else if (msg.type === 'snapshot') {
    msg.cards.forEach((c) => upsertCard(c, false));
    if (msg.strokes) msg.strokes.forEach((s) => addStroke(s, false));
  } else if (msg.type === 'add') {
    upsertCard(msg.card, false);
  } else if (msg.type === 'move') {
    const c = cards.get(msg.id);
    if (c) {
      c.x = msg.x; c.y = msg.y; c.z = msg.z;
      renderCard(c);
    }
  } else if (msg.type === 'delete') {
    removeCard(msg.id, false);
  } else if (msg.type === 'note') {
    const c = cards.get(msg.id);
    if (c) {
      c.payload.text = msg.text;
      renderCard(c);
    }
  } else if (msg.type === 'stroke') {
    addStroke(msg.stroke, false);
  } else if (msg.type === 'erase-stroke') {
    removeStroke(msg.id, false);
  } else if (msg.type === 'cursor') {
    showPartnerCursor(msg.x, msg.y, msg.name);
  } else if (msg.type === 'cursor-leave') {
    hidePartnerCursor();
  } else if (msg.type === 'reaction') {
    spawnReactionAtCanvas(msg.x, msg.y, msg.emoji);
  } else if (msg.type === 'point') {
    spawnPointAtCanvas(msg.x, msg.y, msg.name, msg.color);
  }
}

function send(msg) {
  if (conn && conn.open) {
    try { conn.send(msg); } catch (e) { /* ignore */ }
  }
}

/* ============================================================
   CARDS
============================================================ */
function newId() { return 'c_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6); }

function addCard(type, payload, opts = {}) {
  const center = screenToCanvas(window.innerWidth / 2, window.innerHeight / 2);
  const card = {
    id: opts.id || newId(),
    type,
    x: opts.x ?? (center.x - 110 + (Math.random() * 60 - 30)),
    y: opts.y ?? (center.y - 110 + (Math.random() * 60 - 30)),
    w: opts.w || (type === 'note' ? 220 : 220),
    h: opts.h || (type === 'note' ? 160 : 220),
    payload,
    z: ++nextZ,
  };
  upsertCard(card, true);
  return card;
}

function flashCard(id) {
  const el = document.getElementById('card-' + id);
  if (!el) return;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 1200);
}

function upsertCard(card, broadcast) {
  const existing = cards.get(card.id);
  if (existing) {
    Object.assign(existing, card);
  } else {
    cards.set(card.id, card);
  }
  if (card.z >= nextZ) nextZ = card.z + 1;
  renderCard(cards.get(card.id));
  if (broadcast) send({ type: 'add', card });
}

function removeCard(id, broadcast) {
  const c = cards.get(id);
  if (!c) return;
  const el = document.getElementById('card-' + id);
  if (el) {
    el.style.transition = 'transform 200ms var(--easing), opacity 200ms';
    el.style.transform += ' scale(0.85)';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 220);
  }
  cards.delete(id);
  if (broadcast) send({ type: 'delete', id });
}

function renderCard(card) {
  let el = document.getElementById('card-' + card.id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'card-' + card.id;
    el.className = 'card';
    // Random ambient breathe color + delay so cards don’t pulse in unison.
    const palette = [
      'rgba(255, 154, 139, 0.30)',  // peach
      'rgba(180, 165, 255, 0.30)',  // lavender
      'rgba(140, 220, 200, 0.30)',  // mint
      'rgba(255, 200, 130, 0.30)',  // amber
      'rgba(160, 200, 255, 0.32)',  // sky
      'rgba(255, 175, 220, 0.30)',  // rose
    ];
    const accentPal = [
      'rgba(255, 105, 90, 0.45)',
      'rgba(140, 120, 255, 0.45)',
      'rgba(60, 200, 170, 0.45)',
      'rgba(255, 175, 80, 0.45)',
      'rgba(80, 160, 255, 0.45)',
      'rgba(255, 130, 200, 0.45)',
    ];
    const idx = Math.floor(Math.random() * palette.length);
    el.style.setProperty('--breathe-color', palette[idx]);
    el.style.setProperty('--card-accent', accentPal[idx]);
    el.style.setProperty('--breathe-delay', (Math.random() * 6).toFixed(2) + 's');
    canvasEl.appendChild(el);
    attachCardInteractions(el, card);
  }
  el.style.left = card.x + 'px';
  el.style.top = card.y + 'px';
  el.style.width = card.w + 'px';
  el.style.height = card.h + 'px';
  el.style.zIndex = card.z;

  // Build content INSIDE .card-inner so the card can keep an outer halo.
  const ensureInner = () => {
    let inner = el.querySelector(':scope > .card-inner');
    if (!inner) {
      inner = document.createElement('div');
      inner.className = 'card-inner';
      el.appendChild(inner);
    }
    return inner;
  };

  // content
  if (card.type === 'image') {
    el.classList.add('card-image');
    const inner = ensureInner();
    inner.innerHTML = `
      <img src="${card.payload.src}" alt="">
      <button class="delete-btn" data-act="del" aria-label="Удалить">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"/></svg>
      </button>`;
  } else if (card.type === 'note') {
    el.classList.add('card-note');
    const inner = ensureInner();
    if (!inner.querySelector('.text-area')) {
      inner.innerHTML = `
        <textarea class="text-area" placeholder="Напиши что-нибудь..."></textarea>
        <button class="delete-btn" data-act="del" aria-label="Удалить">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"/></svg>
        </button>`;
      const ta = inner.querySelector('.text-area');
      ta.addEventListener('input', () => {
        card.payload.text = ta.value;
        send({ type: 'note', id: card.id, text: ta.value });
      });
      ta.addEventListener('mousedown', (e) => e.stopPropagation());
    }
    const ta = inner.querySelector('.text-area');
    if (ta.value !== (card.payload.text || '')) ta.value = card.payload.text || '';
  } else if (card.type === 'color') {
    el.classList.add('card-color');
    const inner = ensureInner();
    inner.style.background = card.payload.color;
    inner.innerHTML = `
      <span class="swatch-label">${card.payload.color}</span>
      <button class="delete-btn" data-act="del" aria-label="Удалить">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"/></svg>
      </button>`;
    // Pull the card-color’s glow accent from its actual swatch hue.
    el.style.setProperty('--card-accent', card.payload.color + 'cc');
  }
}

function attachCardInteractions(el, card) {
  let dragging = false, sx, sy, ox, oy;
  el.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    if (e.target.closest('[data-act="del"]')) {
      removeCard(card.id, true);
      e.stopPropagation();
      return;
    }
    if (e.target.tagName === 'TEXTAREA') return;
    if (spaceDown) return;
    dragging = true;
    el.classList.add('dragging');
    card.z = ++nextZ;
    el.style.zIndex = card.z;
    sx = e.clientX; sy = e.clientY;
    ox = card.x; oy = card.y;
    e.preventDefault();
    e.stopPropagation();
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = (e.clientX - sx) / viewport.scale;
    const dy = (e.clientY - sy) / viewport.scale;
    card.x = ox + dx;
    card.y = oy + dy;
    el.style.left = card.x + 'px';
    el.style.top = card.y + 'px';
    send({ type: 'move', id: card.id, x: card.x, y: card.y, z: card.z });
  });
  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    el.classList.remove('dragging');
  });
  // touch
  el.addEventListener('touchstart', (e) => {
    if (e.target.closest('[data-act="del"]')) return;
    if (e.target.tagName === 'TEXTAREA') return;
    const t = e.touches[0];
    dragging = true;
    el.classList.add('dragging');
    card.z = ++nextZ;
    el.style.zIndex = card.z;
    sx = t.clientX; sy = t.clientY;
    ox = card.x; oy = card.y;
  }, { passive: true });
  el.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const t = e.touches[0];
    const dx = (t.clientX - sx) / viewport.scale;
    const dy = (t.clientY - sy) / viewport.scale;
    card.x = ox + dx;
    card.y = oy + dy;
    el.style.left = card.x + 'px';
    el.style.top = card.y + 'px';
    send({ type: 'move', id: card.id, x: card.x, y: card.y, z: card.z });
  }, { passive: true });
  el.addEventListener('touchend', () => {
    dragging = false;
    el.classList.remove('dragging');
  });
}

function setupToolbarActions() {
  document.getElementById('addImageBtn').addEventListener('click', () => {
    document.getElementById('fileInput').click();
  });
  document.getElementById('fileInput').addEventListener('change', (e) => {
    const files = Array.from(e.target.files || []);
    files.forEach((f) => addImageFile(f));
    e.target.value = '';
  });
  document.getElementById('addNoteBtn').addEventListener('click', () => {
    addCard('note', { text: '' });
  });
  document.getElementById('addColorBtn').addEventListener('click', () => {
    const palette = ['#FFB5A7', '#F8AD9D', '#FCD5CE', '#F4ACB7', '#A0C4FF', '#BDB2FF', '#CDB4DB', '#B5EAD7', '#C7F0BD', '#FFE5B4', '#FAEBD7'];
    const color = palette[Math.floor(Math.random() * palette.length)];
    addCard('color', { color }, { w: 180, h: 180 });
  });
  document.getElementById('shareBtn').addEventListener('click', () => {
    document.getElementById('shareModal').classList.add('show');
    document.getElementById('connectInput').focus();
  });

function addImageFile(file) {
  if (!file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = () => {
    // Размер в зависимости от соотношения сторон
    const img = new Image();
    img.onload = () => {
      const maxDim = 280;
      let w, h;
      if (img.width > img.height) {
        w = maxDim; h = Math.round(maxDim * img.height / img.width);
      } else {
        h = maxDim; w = Math.round(maxDim * img.width / img.height);
      }
      addCard('image', { src: reader.result }, { w, h });
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

/* ============================================================
   CANVAS INTERACTIONS (pan, zoom)
============================================================ */
let spaceDown = false;
let panning = false;
let panStart = { x: 0, y: 0, vx: 0, vy: 0 };

function setupCanvasInteractions() {
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'INPUT') {
      spaceDown = true;
      boardScreen.classList.add('space-down');
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space') {
      spaceDown = false;
      boardScreen.classList.remove('space-down');
    }
  });
  boardScreen.addEventListener('mousedown', (e) => {
    if (e.target.closest('.toolbar') || e.target.closest('.modal-backdrop') || e.target.closest('.card')) return;
    if (spaceDown || e.button === 1) {
      panning = true;
      canvasEl.classList.add('panning');
      panStart = { x: e.clientX, y: e.clientY, vx: viewport.x, vy: viewport.y };
      e.preventDefault();
    }
  });
  window.addEventListener('mousemove', (e) => {
    if (!panning) return;
    viewport.x = panStart.vx + (e.clientX - panStart.x);
    viewport.y = panStart.vy + (e.clientY - panStart.y);
    applyViewport();
  });
  window.addEventListener('mouseup', () => {
    panning = false;
    canvasEl.classList.remove('panning');
  });

  boardScreen.addEventListener('wheel', (e) => {
    if (e.target.closest('.toolbar')) return;
    e.preventDefault();
    if (e.ctrlKey || e.metaKey) {
      // pinch zoom
      const factor = Math.exp(-e.deltaY * 0.01);
      zoomAt(e.clientX, e.clientY, factor);
    } else {
      const factor = Math.exp(-e.deltaY * 0.0015);
      zoomAt(e.clientX, e.clientY, factor);
    }
  }, { passive: false });
}

function zoomAt(cx, cy, factor) {
  const newScale = Math.max(0.3, Math.min(3, viewport.scale * factor));
  const realFactor = newScale / viewport.scale;
  viewport.x = cx - (cx - viewport.x) * realFactor;
  viewport.y = cy - (cy - viewport.y) * realFactor;
  viewport.scale = newScale;
  applyViewport();
}

function screenToCanvas(sx, sy) {
  return {
    x: (sx - viewport.x) / viewport.scale,
    y: (sy - viewport.y) / viewport.scale,
  };
}

/* ============================================================
   DRAG & DROP FROM SYSTEM
============================================================ */
function setupDragDrop() {
  const overlay = document.getElementById('dropOverlay');
  let depth = 0;
  window.addEventListener('dragenter', (e) => {
    if (!e.dataTransfer || !e.dataTransfer.types.includes('Files')) return;
    depth++;
    overlay.classList.add('show');
  });
  window.addEventListener('dragleave', (e) => {
    depth--;
    if (depth <= 0) { depth = 0; overlay.classList.remove('show'); }
  });
  window.addEventListener('dragover', (e) => {
    if (e.dataTransfer && e.dataTransfer.types.includes('Files')) e.preventDefault();
  });
  window.addEventListener('drop', (e) => {
    e.preventDefault();
    depth = 0; overlay.classList.remove('show');
    const files = Array.from(e.dataTransfer.files || []);
    files.forEach((f) => addImageFile(f));
  });
}

function setupShareModal() {

  document.getElementById('closeShare').addEventListener('click', () => modal.classList.remove('show'));

/* ============================================================
   DRAWING TOOLS
============================================================ */
let activeTool = null; // 'pen' | 'marker' | 'eraser' | null
let drawColor = '#1a1a1c';
let drawSize = 4;
let currentStroke = null;
let isDrawing = false;

function setupDrawingTools() {
  const popover = document.getElementById('drawPopover');
  const penBtn = document.getElementById('penBtn');
  const markerBtn = document.getElementById('markerBtn');
  const eraserBtn = document.getElementById('eraserBtn');

  // initialize default selections
  popover.querySelector(`.swatch[data-color="${drawColor}"]`)?.classList.add('active');
  popover.querySelector(`.size-btn[data-size="${drawSize}"]`)?.classList.add('active');

  function setTool(tool) {
    if (activeTool === tool) {
      activeTool = null;
    } else {
      activeTool = tool;
    }
    [penBtn, markerBtn, eraserBtn].forEach((b) => b.classList.remove('active'));
    if (activeTool === 'pen') penBtn.classList.add('active');
    if (activeTool === 'marker') markerBtn.classList.add('active');
    if (activeTool === 'eraser') eraserBtn.classList.add('active');

    if (activeTool === 'pen' || activeTool === 'marker') {
      popover.classList.add('show');
    } else {
      popover.classList.remove('show');
    }
    boardScreen.classList.toggle('drawing-mode', !!activeTool);
  }

  penBtn.addEventListener('click', () => setTool('pen'));
  markerBtn.addEventListener('click', () => setTool('marker'));
  eraserBtn.addEventListener('click', () => setTool('eraser'));

  popover.querySelectorAll('.swatch').forEach((sw) => {
    sw.addEventListener('click', () => {
      drawColor = sw.dataset.color;
      popover.querySelectorAll('.swatch').forEach((s) => s.classList.remove('active'));
      sw.classList.add('active');
    });
  });
  popover.querySelectorAll('.size-btn').forEach((bt) => {
    bt.addEventListener('click', () => {
      drawSize = parseInt(bt.dataset.size, 10);
      popover.querySelectorAll('.size-btn').forEach((b) => b.classList.remove('active'));
      bt.classList.add('active');
    });
  });

  // Pointer events on board for drawing
  boardScreen.addEventListener('pointerdown', (e) => {
    if (!activeTool) return;
    if (e.target.closest('.toolbar') || e.target.closest('.draw-popover') || e.target.closest('.modal-backdrop')) return;
    if (e.button !== 0) return;
    if (activeTool === 'eraser') {
      // erase strokes near point
      const p = screenToCanvas(e.clientX, e.clientY);
      eraseAt(p.x, p.y, 14);
      isDrawing = true;
      e.preventDefault();
      return;
    }
    isDrawing = true;
    const p = screenToCanvas(e.clientX, e.clientY);
    currentStroke = {
      id: 's_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 5),
      tool: activeTool,
      color: drawColor,
      size: drawSize,
      points: [[p.x, p.y]],
    };
    addStroke(currentStroke, true, true);
    e.preventDefault();
  });

  window.addEventListener('pointermove', (e) => {
    if (!isDrawing || !activeTool) return;
    const p = screenToCanvas(e.clientX, e.clientY);
    if (activeTool === 'eraser') {
      eraseAt(p.x, p.y, 14);
      return;
    }
    if (!currentStroke) return;
    const last = currentStroke.points[currentStroke.points.length - 1];
    if (Math.hypot(last[0] - p.x, last[1] - p.y) < 1.5) return;
    currentStroke.points.push([p.x, p.y]);
    updateStrokePath(currentStroke);
  });

  window.addEventListener('pointerup', () => {
    if (isDrawing && currentStroke) {
      send({ type: 'stroke', stroke: currentStroke });
    }
    isDrawing = false;
    currentStroke = null;
  });
}

function smoothPath(points) {
  if (points.length < 2) {
    if (points.length === 1) return `M ${points[0][0]} ${points[0][1]} l 0.1 0.1`;
    return '';
  }
  let d = `M ${points[0][0]} ${points[0][1]}`;
  for (let i = 1; i < points.length - 1; i++) {
    const xc = (points[i][0] + points[i + 1][0]) / 2;
    const yc = (points[i][1] + points[i + 1][1]) / 2;
    d += ` Q ${points[i][0]} ${points[i][1]} ${xc} ${yc}`;
  }
  const last = points[points.length - 1];
  d += ` L ${last[0]} ${last[1]}`;
  return d;
}

function addStroke(stroke, broadcast, isLive) {
  strokes.set(stroke.id, stroke);
  const svg = document.getElementById('drawLayer');
  if (!svg) return;
  const svgNS = 'http://www.w3.org/2000/svg';
  let path = document.getElementById('stroke-' + stroke.id);
  if (!path) {
    path = document.createElementNS(svgNS, 'path');
    path.id = 'stroke-' + stroke.id;
    path.dataset.strokeId = stroke.id;
    svg.appendChild(path);
  }
  path.setAttribute('stroke', stroke.color);
  path.setAttribute('stroke-width', stroke.size);
  if (stroke.tool === 'marker') {
    path.setAttribute('stroke-opacity', '0.35');
    path.setAttribute('stroke-width', stroke.size * 2.4);
    path.style.mixBlendMode = 'multiply';
  } else {
    path.setAttribute('stroke-opacity', '1');
    path.style.mixBlendMode = 'normal';
  }
  // skip strokeIn animation for live drawing (would erase what user is seeing)
  if (isLive) path.style.animation = 'none';
  updateStrokePath(stroke);
  if (broadcast) send({ type: 'stroke', stroke });
}

function updateStrokePath(stroke) {
  const path = document.getElementById('stroke-' + stroke.id);
  if (!path) return;
  path.setAttribute('d', smoothPath(stroke.points));
}

function removeStroke(id, broadcast) {
  strokes.delete(id);
  const path = document.getElementById('stroke-' + id);
  if (path) {
    path.style.transition = 'opacity 200ms';
    path.style.opacity = '0';
    setTimeout(() => path.remove(), 220);
  }
  if (broadcast) send({ type: 'erase-stroke', id });
}

function eraseAt(x, y, radius) {
  const r2 = radius * radius;
  for (const stroke of Array.from(strokes.values())) {
    for (const [px, py] of stroke.points) {
      const dx = px - x, dy = py - y;
      if (dx * dx + dy * dy < r2) {
        removeStroke(stroke.id, true);
        break;
      }
    }
  }
}

/* ============================================================
   CURSORS / REACTIONS / POINT
============================================================ */
function hashColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  const hue = h % 360;
  return `oklch(0.62 0.18 ${hue})`;
}

let partnerCursorEl = null;
let cursorHideTimer = null;
function showPartnerCursor(x, y, name) {
  if (!partnerCursorEl) {
    partnerCursorEl = document.createElement('div');
    partnerCursorEl.className = 'partner-cursor';
    partnerCursorEl.innerHTML = `
      <svg width="22" height="26" viewBox="0 0 22 26" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 2 L2 22 L7.5 17 L11 24 L14 22.5 L10.5 15.5 L18 15.5 Z" fill="#000" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/>
      </svg>
      <span class="name-tag"></span>`;
    document.body.appendChild(partnerCursorEl);
  }
  partnerCursorEl.classList.remove('fade-out');
  const tag = partnerCursorEl.querySelector('.name-tag');
  tag.textContent = name || 'Партнёр';
  tag.style.background = partnerColor || hashColor(name || 'partner');
  // x,y are canvas coords -> screen
  const sx = x * viewport.scale + viewport.x;
  const sy = y * viewport.scale + viewport.y;
  partnerCursorEl.style.transform = `translate(${sx}px, ${sy}px)`;
  clearTimeout(cursorHideTimer);
  cursorHideTimer = setTimeout(hidePartnerCursor, 5000);
}
function hidePartnerCursor() {
  if (partnerCursorEl) partnerCursorEl.classList.add('fade-out');
}

let lastCursorSent = 0;
function setupCursorReactionsPoint() {
  // throttled cursor send
  window.addEventListener('mousemove', (e) => {
    const now = performance.now();
    if (now - lastCursorSent < 30) return;
    lastCursorSent = now;
    if (!conn || !conn.open) return;
    const p = screenToCanvas(e.clientX, e.clientY);
    send({ type: 'cursor', x: p.x, y: p.y, name: nickname });
  });
  window.addEventListener('blur', () => send({ type: 'cursor-leave' }));

  // Alt + click: point marker
  boardScreen.addEventListener('click', (e) => {
    if (!e.altKey) return;
    if (e.target.closest('.toolbar') || e.target.closest('.modal-backdrop') || e.target.closest('.draw-popover')) return;
    e.preventDefault();
    e.stopPropagation();
    const p = screenToCanvas(e.clientX, e.clientY);
    const color = hashColor(nickname);
    spawnPointAtCanvas(p.x, p.y, nickname, color);
    send({ type: 'point', x: p.x, y: p.y, name: nickname, color });
  }, true);

  // Double click: reactions
  canvasEl.addEventListener('dblclick', (e) => {
    if (!e.target.closest('.card')) return;
    const emojis = ['♥','✨','🔥','⭐'];
    const emoji = emojis[Math.floor(Math.random()*emojis.length)];
    const p = screenToCanvas(e.clientX, e.clientY);
    spawnReactionAtCanvas(p.x, p.y, emoji);
    send({ type: 'reaction', x: p.x, y: p.y, emoji });
    e.stopPropagation();
  });
}

function spawnReactionAtCanvas(cx, cy, emoji) {
  const sx = cx * viewport.scale + viewport.x;
  const sy = cy * viewport.scale + viewport.y;
  const el = document.createElement('div');
  el.className = 'reaction-fly';
  el.textContent = emoji;
  el.style.left = sx + 'px';
  el.style.top = sy + 'px';
  el.style.color = emoji === '♥' ? '#FF3B5C' : (emoji === '🔥' ? '#FF9500' : '#FFB400');
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

function spawnPointAtCanvas(cx, cy, name, color) {
  const sx = cx * viewport.scale + viewport.x;
  const sy = cy * viewport.scale + viewport.y;
  const el = document.createElement('div');
  el.className = 'point-marker';
  el.style.left = sx + 'px';
  el.style.top = sy + 'px';
  el.style.setProperty('--pmcolor', color || '#2F6FED');
  el.innerHTML = `
    <span class="ring"></span>
    <span class="ring r2"></span>
    <span class="core">${(name||'?')[0].toUpperCase()}</span>`;
  document.body.appendChild(el);
  setTimeout(() => { el.classList.add('fade'); }, 2200);
  setTimeout(() => el.remove(), 2600);
}

function eraseAtKEEP() {} // (placeholder so original eraseAt stays)


</script>
